####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################

version: "1.0"
linter: jetbrains/qodana-jvm:2025.3
bootstrap: chmod +x gradlew && echo 'qodanaAnalysis=true' >> gradle.properties && find /data/cache/idea -name "*wasmJs*" -type f -delete 2>/dev/null || true && ./gradlew :composeApp:jvmMainClasses :shared:jvmJar :cli:classes :server:classes --no-daemon
profile:
  name: qodana.recommended
include:
  - name: CheckDependencyLicenses
exclude:
  - name: All
    paths:
      - composeApp/src/webMain
