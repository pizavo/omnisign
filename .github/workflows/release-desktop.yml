name: Release — Desktop & Web

on:
  push:
    tags:
      - 'desktop/v*'

env:
  WIX_VERSION: '6.0.2'

jobs:
  prepare:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#desktop/v}" >> $GITHUB_OUTPUT

  test:
    name: Test — ${{ matrix.os }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Run tests
        run: ./gradlew :shared:jvmTest :composeApp:jvmTest

  build-linux:
    name: Package — Linux & Web
    needs: [prepare, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Install RPM tools
        run: sudo apt-get install -y rpm

      - name: Build Linux packages
        run: ./gradlew :composeApp:packageDeb :composeApp:packageRpm :composeApp:packageAppImage -PreleaseVersion=${{ needs.prepare.outputs.version }}

      - name: Build Wasm distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution -PreleaseVersion=${{ needs.prepare.outputs.version }}

      - name: Zip Wasm distribution
        run: |
          cd composeApp/build/dist/wasmJs/productionExecutable
          zip -r "$GITHUB_WORKSPACE/composeApp/build/web-dist.zip" .

      - name: Upload DEB
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux-deb
          path: composeApp/build/compose/binaries/main/deb/*.deb
          if-no-files-found: error

      - name: Upload RPM
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux-rpm
          path: composeApp/build/compose/binaries/main/rpm/*.rpm
          if-no-files-found: error

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux-appimage
          path: composeApp/build/compose/binaries/main/app-image/*.AppImage
          if-no-files-found: error

      - name: Upload web distribution
        uses: actions/upload-artifact@v7
        with:
          name: desktop-web-dist
          path: composeApp/build/web-dist.zip
          if-no-files-found: error

  build-windows:
    name: Package — Windows
    needs: [prepare, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Install WiX
        run: |
          dotnet tool install --global wix --version ${{ env.WIX_VERSION }}
          wix extension add --global WixToolset.UI.wixext/${{ env.WIX_VERSION }}
          wix extension add --global WixToolset.Util.wixext/${{ env.WIX_VERSION }}

      - name: Build Windows packages
        env:
          ORG_GRADLE_PROJECT_releaseVersion: ${{ needs.prepare.outputs.version }}
        run: ./gradlew :composeApp:packageMsi :composeApp:packageExe

      - name: Upload MSI
        uses: actions/upload-artifact@v7
        with:
          name: desktop-windows-msi
          path: composeApp/build/compose/binaries/main/msi/*.msi
          if-no-files-found: error

      - name: Upload EXE
        uses: actions/upload-artifact@v7
        with:
          name: desktop-windows-exe
          path: composeApp/build/compose/binaries/main/exe/*.exe
          if-no-files-found: error

  build-macos:
    name: Package — macOS
    needs: [prepare, test]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Build macOS package
        run: ./gradlew :composeApp:packageDmg -PreleaseVersion=${{ needs.prepare.outputs.version }}

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: desktop-macos-dmg
          path: composeApp/build/compose/binaries/main/dmg/*.dmg
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Desktop ${{ github.ref_name }}"
          generate_release_notes: true
          files: artifacts/*
