name: CI — Web

on:
  push:
    branches: [main]
    paths:
      - 'composeApp/**'
      - 'shared/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
  pull_request:
    branches: [main]
    paths:
      - 'composeApp/**'
      - 'shared/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
  workflow_dispatch:

jobs:
  build:
    name: Build Web (Wasm)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Build Wasm distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution

