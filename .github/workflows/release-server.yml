name: Release — Server

on:
  push:
    tags:
      - 'server/v*'

jobs:
  build-and-release:
    name: Build, Dockerize & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Run tests
        run: ./gradlew :shared:jvmTest :server:test

      - name: Build fat JAR
        run: ./gradlew :server:buildFatJar -PreleaseVersion=${{ steps.version.outputs.version }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#server/v}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/omnisign-server
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prev_tag=$(gh api "repos/${{ github.repository }}/releases" \
            --jq '[.[] | select(.tag_name | startswith("server/v")) | .tag_name] | first' \
            2>/dev/null || echo "")

          args=(--method POST
                -f tag_name="${{ github.ref_name }}"
                -f configuration_file_path=".github/release-server.yml")

          if [ -n "$prev_tag" ]; then
            args+=(-f previous_tag_name="$prev_tag")
          fi

          notes=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
            "${args[@]}" --jq '.body')

          {
            echo "body<<EOF"
            echo "$notes"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Server ${{ github.ref_name }}"
          body: ${{ steps.notes.outputs.body }}
          files: server/build/libs/*-all.jar
