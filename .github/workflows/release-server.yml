name: Release — Server

on:
  push:
    tags:
      - 'server/v*'

jobs:
  build-and-release:
    name: Build, Dockerize & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-gradle

      - name: Build fat JAR
        run: ./gradlew :server:buildFatJar

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#server/v}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/omnisign-server
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Server ${{ github.ref_name }}"
          generate_release_notes: true
          files: server/build/libs/*-all.jar
