name: CI — Desktop

on:
  push:
    branches: [main]
    paths:
      - 'composeApp/**'
      - 'shared/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
  pull_request:
    branches: [main]
    paths:
      - 'composeApp/**'
      - 'shared/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
  workflow_dispatch:

jobs:
  build:
    name: Build & Test — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Build and test
        run: ./gradlew :shared:jvmTest :composeApp:jvmTest :composeApp:createDistributable

