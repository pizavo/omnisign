name: Release — CLI

on:
  push:
    tags:
      - 'cli/v*'

env:
  WIX_VERSION: '6.0.2'

jobs:
  prepare:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#cli/v}" >> $GITHUB_OUTPUT

  test:
    name: Test — ${{ matrix.os }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Run tests
        run: ./gradlew :shared:jvmTest :cli:test

  build-linux:
    name: Package — Linux
    needs: [prepare, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Install tooling
        run: |
          sudo apt-get update -q
          sudo apt-get install -y librsvg2-bin rpm

      - name: Build shadow JAR and Linux packages
        run: ./gradlew :cli:shadowJar :cli:jpackageDeb :cli:jpackageRpm :cli:jpackageLinuxImage -PreleaseVersion=${{ needs.prepare.outputs.version }}

      - name: Upload jpackage logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: jpackage-logs-linux
          path: cli/build/jpackage/**/jpackage-*.txt
          if-no-files-found: ignore

      - name: Tar portable app-image
        run: |
          version="${{ needs.prepare.outputs.version }}"
          tar -czf "cli/build/jpackage/omnisign-cli-${version}-linux-portable.tar.gz" \
            -C "cli/build/jpackage/linux-image" .

      - name: Upload fat JAR
        uses: actions/upload-artifact@v7
        with:
          name: cli-jar
          path: cli/build/libs/omnisign-*.jar
          if-no-files-found: error

      - name: Upload DEB
        uses: actions/upload-artifact@v7
        with:
          name: cli-linux-deb
          path: cli/build/jpackage/linux-deb/*.deb
          if-no-files-found: error

      - name: Upload RPM
        uses: actions/upload-artifact@v7
        with:
          name: cli-linux-rpm
          path: cli/build/jpackage/linux-rpm/*.rpm
          if-no-files-found: error

      - name: Upload portable tarball
        uses: actions/upload-artifact@v7
        with:
          name: cli-linux-portable
          path: cli/build/jpackage/*-linux-portable.tar.gz
          if-no-files-found: error

  build-windows:
    name: Package — Windows
    needs: [prepare, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Install ImageMagick
        shell: powershell
        run: choco install imagemagick -y

      - name: Install WiX
        run: |
          dotnet tool install --global wix --version ${{ env.WIX_VERSION }}
          wix extension add --global WixToolset.UI.wixext/${{ env.WIX_VERSION }}
          wix extension add --global WixToolset.Util.wixext/${{ env.WIX_VERSION }}

      - name: Build Windows packages
        env:
          ORG_GRADLE_PROJECT_releaseVersion: ${{ needs.prepare.outputs.version }}
        run: ./gradlew :cli:jpackageWinExe :cli:jpackageWinMsi

      - name: Upload jpackage logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: jpackage-logs-windows
          path: cli/build/jpackage/**/jpackage-*.txt
          if-no-files-found: ignore

      - name: Zip portable app-image
        shell: powershell
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          Compress-Archive -Path "cli\build\jpackage\win-image\*" `
            -DestinationPath "cli\build\jpackage\omnisign-cli-${version}-win-portable.zip" -Force

      - name: Upload MSI
        uses: actions/upload-artifact@v7
        with:
          name: cli-windows-msi
          path: cli/build/jpackage/win-msi/*.msi
          if-no-files-found: error

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v7
        with:
          name: cli-windows-portable
          path: cli/build/jpackage/*-win-portable.zip
          if-no-files-found: error

  build-macos:
    name: Package — macOS
    needs: [prepare, test]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Install librsvg
        run: brew install librsvg

      - name: Build macOS packages
        run: ./gradlew :cli:jpackageDmg :cli:jpackagePkg -PreleaseVersion=${{ needs.prepare.outputs.version }}

      - name: Upload jpackage logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: jpackage-logs-macos
          path: cli/build/jpackage/**/jpackage-*.txt
          if-no-files-found: ignore

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: cli-macos-dmg
          path: cli/build/jpackage/mac/*.dmg
          if-no-files-found: error

      - name: Upload PKG
        uses: actions/upload-artifact@v7
        with:
          name: cli-macos-pkg
          path: cli/build/jpackage/mac-pkg/*.pkg
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prev_tag=$(gh api "repos/${{ github.repository }}/releases" \
            --jq '[.[] | select(.tag_name | startswith("cli/v")) | .tag_name] | first' \
            2>/dev/null || echo "")

          args=(--method POST
                -f tag_name="${{ github.ref_name }}"
                -f configuration_file_path=".github/release-cli.yml")

          if [ -n "$prev_tag" ]; then
            args+=(-f previous_tag_name="$prev_tag")
          fi

          notes=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
            "${args[@]}" --jq '.body')

          {
            echo "body<<EOF"
            echo "$notes"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "CLI ${{ github.ref_name }}"
          body: ${{ steps.notes.outputs.body }}
          files: artifacts/*
