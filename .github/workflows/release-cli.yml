name: Release — CLI

on:
  push:
    tags:
      - 'cli/v*'

env:
  WIX_VERSION: '6.0.2'

jobs:
  prepare:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#cli/v}" >> $GITHUB_OUTPUT

  build-linux:
    name: Package — Linux
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Install tooling
        run: |
          sudo apt-get update -q
          sudo apt-get install -y librsvg2-bin rpm

      - name: Build shadow JAR and Linux packages
        run: ./gradlew :cli:shadowJar :cli:jpackageDeb :cli:jpackageRpm -PreleaseVersion=${{ needs.prepare.outputs.version }}

      - name: Upload fat JAR
        uses: actions/upload-artifact@v7
        with:
          name: cli-jar
          path: cli/build/libs/omnisign-*.jar
          if-no-files-found: error

      - name: Upload DEB
        uses: actions/upload-artifact@v7
        with:
          name: cli-linux-deb
          path: cli/build/jpackage/linux-deb/*.deb
          if-no-files-found: error

      - name: Upload RPM
        uses: actions/upload-artifact@v7
        with:
          name: cli-linux-rpm
          path: cli/build/jpackage/linux-rpm/*.rpm
          if-no-files-found: error

  build-windows:
    name: Package — Windows
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Install ImageMagick
        shell: powershell
        run: choco install imagemagick -y

      - name: Install WiX
        run: |
          dotnet tool install --global wix --version ${{ env.WIX_VERSION }}
          wix extension add --global WixToolset.UI.wixext/${{ env.WIX_VERSION }}
          wix extension add --global WixToolset.Util.wixext/${{ env.WIX_VERSION }}

      - name: Build Windows packages
        env:
          ORG_GRADLE_PROJECT_releaseVersion: ${{ needs.prepare.outputs.version }}
        run: ./gradlew :cli:jpackageWinExe :cli:jpackageWinMsi

      - name: Zip portable app-image
        shell: powershell
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          Compress-Archive -Path "cli\build\jpackage\win-image\*" `
            -DestinationPath "cli\build\jpackage\omnisign-cli-${version}-win-portable.zip" -Force

      - name: Upload MSI
        uses: actions/upload-artifact@v7
        with:
          name: cli-windows-msi
          path: cli/build/jpackage/win-msi/*.msi
          if-no-files-found: error

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v7
        with:
          name: cli-windows-portable
          path: cli/build/jpackage/*-win-portable.zip
          if-no-files-found: error

  build-macos:
    name: Package — macOS
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-gradle

      - name: Install librsvg
        run: brew install librsvg

      - name: Build macOS package
        run: ./gradlew :cli:jpackageDmg -PreleaseVersion=${{ needs.prepare.outputs.version }}

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: cli-macos-dmg
          path: cli/build/jpackage/mac/*.dmg
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "CLI ${{ github.ref_name }}"
          generate_release_notes: true
          files: artifacts/*
