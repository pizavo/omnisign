name: 'Setup Java & Gradle'
description: 'Sets up Temurin JDK 25 (Gradle launcher) and configures Gradle with build caching. JBR is auto-provisioned by the Gradle foojay toolchain resolver when needed.'

runs:
  using: composite
  steps:
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '25'

    - name: Make gradlew executable
      shell: bash
      run: chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
