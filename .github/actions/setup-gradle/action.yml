name: 'Setup Java & Gradle'
description: 'Sets up JDK 25 and configures Gradle with build caching.'

inputs:
  distribution:
    description: 'JDK distribution to install (e.g. temurin, jetbrains).'
    required: false
    default: 'temurin'
  github-token:
    description: 'GitHub token for authenticated API requests (avoids rate limits).'
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        distribution: ${{ inputs.distribution }}
        java-version: '25'
        token: ${{ inputs.github-token }}

    - name: Make gradlew executable
      shell: bash
      run: chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
