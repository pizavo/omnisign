name: 'Setup Java & Gradle'
description: 'Sets up Temurin JDK 25 (Gradle launcher) and configures Gradle with build caching. JBR is auto-provisioned by the Gradle foojay toolchain resolver when needed.'

runs:
  using: composite
  steps:
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '25'

    - name: Start D-Bus session and Secret Service
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get install -y -qq gnome-keyring dbus-x11 > /dev/null 2>&1
        eval $(dbus-launch --sh-syntax)
        echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> "$GITHUB_ENV"
        echo '' | gnome-keyring-daemon --unlock --components=secrets

    - name: Make gradlew executable
      shell: bash
      run: chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
