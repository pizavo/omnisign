name: 'Setup Java & Gradle'
description: 'Sets up JDK 25 Temurin and configures Gradle with build caching.'

runs:
  using: composite
  steps:
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: '25'

    - name: Make gradlew executable
      shell: bash
      run: chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
